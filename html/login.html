<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - La Croûte d'Or</title>
    <link rel="stylesheet" href="../index.css">
    <link rel="stylesheet" href="../css/html/login.css">
    <script src="../js/login.js"></script>
</head>
<body>
    <header class="header">
        <div class="logo">
            <h1>La croute d'or</h1>
        </div>
        <nav class="nav">
            <button class="nav-button nv0" id="nv0">Accueil</button>
        </nav>
    </header>
    <main class="login-main">
        <section class="main-connexion">
            <h2>Connexion</h2>
            <div class="connexion-area" id="connexion-area">
                <div class="connexion-area-div">
                <label for="username"> Nom d'utilisateur : </label>
                <input type="text" id="username" placeholder="Nom d'utilisateur">
                </div>
                <div class="connexion-area-div">
                    <label for="password"> Mot de passe : </label>
                    <input type="password" id="password" placeholder="Mot de passe">
                </div>
                <button id="connexion">Connexion</button>
            </div>
        </section>
    </main>
</body>
</html>
