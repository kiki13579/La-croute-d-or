<!DOCTYPE html>
<html lang="fr">

</head>
<body>

        <div class="logo">

    <main class="admin-main">

        <section class="main-panel">
            <h2>Admin panel</h2>
            <div class="content-area" id="content-area">
            </div>
        </section>
    </main>
    <script src="../js/admin_panel.js"></script>
